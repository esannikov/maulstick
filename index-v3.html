<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAULSTICK — Agent-powered system for AI film production</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══ */
:root {
  --ms-bg:#111111; --ms-bg-2:#1a1a1a;
  --ms-fg:#ffffff; --ms-fg-2:#b0b0b0;
  --ms-accent:#FF6A3A;
  --ms-border:rgba(255,255,255,.08);
  --ms-status-ok:#4ade80; --ms-status-warn:#fbbf24; --ms-status-bad:#f87171;
  --ms-font-heading:'Space Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;
  --ms-font-body:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
  --ms-ease-out:cubic-bezier(0.33,1,0.68,1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; overflow-x:hidden; }
body {
  font-family: var(--ms-font-body);
  background: var(--ms-bg);
  color: var(--ms-fg);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
img { max-width:100%; display:block; }

.container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
@media(max-width:768px){ .container { padding: 0 24px; } }

.section { padding: 100px 0; position:relative; overflow:hidden; }
@media(max-width:768px){ .section { padding: 64px 0; } }
.section-border { border-top: 1px solid var(--ms-border); }

.section-glow { position:relative; }
.section-glow::before { content:''; position:absolute; inset:0; pointer-events:none; z-index:0; }
.section-glow > .container { position:relative; z-index:1; }
.glow-blue::before    { background: radial-gradient(ellipse 70% 50% at 0% 20%, rgba(59,130,246,.12), transparent 70%); }
.glow-orange::before  { background: radial-gradient(ellipse 60% 60% at 90% 80%, rgba(255,106,58,.12), transparent 70%); }
.glow-violet::before  { background: radial-gradient(ellipse 50% 70% at 10% 70%, rgba(139,92,246,.12), transparent 70%); }
.glow-teal::before    { background: radial-gradient(ellipse 60% 50% at 80% 20%, rgba(45,212,191,.12), transparent 70%); }
.glow-rose::before    { background: radial-gradient(ellipse 60% 50% at 20% 30%, rgba(251,113,133,.12), transparent 70%); }
.glow-emerald::before { background: radial-gradient(ellipse 55% 55% at 70% 60%, rgba(52,211,153,.12), transparent 70%); }
.glow-cyan::before    { background: radial-gradient(ellipse 50% 60% at 100% 50%, rgba(34,211,238,.12), transparent 70%); }
.glow-pink::before    { background: radial-gradient(ellipse 50% 50% at 85% 15%, rgba(236,72,153,.12), transparent 70%); }

.reveal { opacity:0; transform: translateY(40px); transition: opacity 900ms var(--ms-ease-out), transform 900ms var(--ms-ease-out); }
.reveal.is-in { opacity:1; transform: none; }
.reveal.d-1 { transition-delay: .1s; }
.reveal.d-2 { transition-delay: .2s; }
.reveal.d-3 { transition-delay: .3s; }

.label-text { font-size:14px; color: var(--ms-fg-2); letter-spacing:2px; text-transform:uppercase; font-weight:500; margin-bottom:20px; }
.section-title { font-family: var(--ms-font-heading); font-size: clamp(40px,7vw,100px); font-weight:500; line-height:.92; letter-spacing:-0.07em; color: var(--ms-fg); }
.section-subtitle { font-size: clamp(14px,1.2vw,16px); color: var(--ms-fg); line-height:1.7; max-width:620px; margin-top:24px; }

.hero { min-height:100vh; position:relative; display:flex; align-items:center; justify-content:center; text-align:center; overflow:hidden; }
.hero-bg { position:absolute; inset:0; background: var(--ms-bg); background-image: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(255,106,58,.12), transparent); }
.hero-bg img { width:100%; height:100%; object-fit:cover; opacity:.2; }
.hero-center { position:relative; z-index:1; padding:40px; }
.hero-eyebrow { font-size:13px; color: var(--ms-fg-2); letter-spacing:3px; text-transform:uppercase; font-weight:500; margin-bottom:24px; }
.hero-title { font-family: var(--ms-font-heading); font-size: clamp(64px,16vw,240px); font-weight:500; line-height:.88; letter-spacing:-0.07em; color: var(--ms-fg); }
.hero-sub { margin-top:32px; font-family: var(--ms-font-heading); font-size: clamp(18px,2vw,24px); font-weight:500; color: var(--ms-fg); letter-spacing:-0.01em; max-width:860px; margin-left:auto; margin-right:auto; line-height:1.35; }
.hero-tagline { margin-top:32px; font-size:15px; color: var(--ms-fg-2); letter-spacing:2px; text-transform:uppercase; font-weight:400; }

.services-grid { display:grid; gap:0; }
.services-grid-3 { grid-template-columns: repeat(3,1fr); }
.services-grid-4 { grid-template-columns: repeat(4,1fr); }
@media(max-width:1100px){ .services-grid-4 { grid-template-columns: repeat(2,1fr); } }
@media(max-width:480px){ .services-grid-3, .services-grid-4 { grid-template-columns: 1fr; } }
.service-box { padding: 40px 30px; border:1px solid transparent; transition: background .3s, border-color .3s; position:relative; overflow:hidden; }
.service-box:hover { background: var(--ms-bg-2); border-color: var(--ms-border); }
.service-box .number { font-size:14px; color: var(--ms-fg-2); font-weight:500; margin-bottom:20px; letter-spacing:1px; }
.service-box .title { font-family: var(--ms-font-heading); font-size:22px; font-weight:500; line-height:1.3; margin-bottom:12px; letter-spacing:-0.02em; }
.service-box .text { font-size:14px; color: var(--ms-fg-2); line-height:1.7; }

.chain-wrap { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
.chain-tag { display:inline-flex; align-items:center; gap:8px; font-size:15px; font-family: var(--ms-font-heading); font-weight:500; color: rgba(255,255,255,.75); background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:2px; padding:10px 18px; white-space:nowrap; }
.chain-tag .c-num { font-size:12px; color: var(--ms-fg-2); }
.chain-tag.gate { color: var(--ms-accent); background: rgba(255,106,58,.08); border-color: rgba(255,106,58,.3); }
.chain-arrow { font-size:15px; color: rgba(255,255,255,.2); padding:0 6px; flex-shrink:0; }

.debate-grid { display:grid; grid-template-columns: repeat(5,1fr); gap:0; border:1px solid var(--ms-border); }
@media(max-width:1100px){ .debate-grid { grid-template-columns: repeat(3,1fr); } }
@media(max-width:700px){ .debate-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:480px){ .debate-grid { grid-template-columns: 1fr; } }
.debate-item { padding:32px 26px; border-right:1px solid var(--ms-border); border-bottom:1px solid var(--ms-border); transition: background .3s; }
.debate-item:hover { background: var(--ms-bg-2); }
.debate-item .d-code { font-size:12px; color: var(--ms-accent); font-weight:500; letter-spacing:2px; margin-bottom:16px; }
.debate-item .d-name { font-family: var(--ms-font-heading); font-size:16px; font-weight:500; margin-bottom:10px; }
.debate-item .d-desc { font-size:13px; color: var(--ms-fg-2); line-height:1.7; }

.cascade-item { display:flex; align-items:center; gap:16px; padding:14px 0; border-bottom:1px solid var(--ms-border); }
.cascade-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.cascade-dot.synced { background: var(--ms-status-ok); }
.cascade-dot.stale { background: var(--ms-status-bad); }
.cascade-dot.check { background: var(--ms-status-warn); }
.cascade-name { font-family: var(--ms-font-heading); font-weight:500; font-size:15px; min-width:200px; }
.cascade-desc { font-size:13px; color: var(--ms-fg-2); }
@media(max-width:600px){
  .cascade-item { flex-wrap: wrap; }
  .cascade-name { min-width: auto; }
}

.fit-grid { display:grid; grid-template-columns: repeat(2,1fr); gap:0; border:1px solid var(--ms-border); }
@media(max-width:900px){ .fit-grid { grid-template-columns: 1fr; } }
.fit-cell { padding:36px 32px; border-right:1px solid var(--ms-border); border-bottom:1px solid var(--ms-border); }
.fit-cell:nth-child(2n) { border-right:none; }
.fit-category { font-size:11px; color: var(--ms-fg-2); letter-spacing:2px; text-transform:uppercase; font-weight:500; margin-bottom:10px; }
.fit-name { font-family: var(--ms-font-heading); font-size:20px; font-weight:500; letter-spacing:-0.02em; margin-bottom:14px; }
.fit-examples { font-size:13px; color: rgba(255,255,255,.55); margin-bottom:14px; line-height:1.6; }
.fit-position { font-size:13px; color: var(--ms-fg); line-height:1.7; padding-top:14px; border-top:1px solid var(--ms-border); }
.fit-position b { color: var(--ms-accent); font-weight:500; }

.accent-strip { padding:18px 24px; border:1px solid rgba(255,106,58,.25); background: rgba(255,106,58,.04); border-radius:2px; display:flex; align-items:center; gap:14px; }
.accent-strip .b { font-size:11px; color: var(--ms-accent); font-weight:500; letter-spacing:2px; flex-shrink:0; }
.accent-strip .t { font-size:13px; color: rgba(255,255,255,.75); line-height:1.5; }
@media(max-width:600px){
  .accent-strip { flex-direction: column; align-items: flex-start; }
}

.cta-wrap { text-align:center; padding:60px 20px; }
.cta-title { font-family: var(--ms-font-heading); font-size: clamp(48px,8vw,120px); font-weight:500; line-height:.92; letter-spacing:-0.07em; color: var(--ms-fg); margin-bottom:28px; }
.cta-sub { font-size:16px; color: var(--ms-fg-2); max-width:560px; margin:0 auto 36px; line-height:1.7; }
.cta-button { display:inline-block; padding:18px 40px; border:1px solid var(--ms-accent); background: rgba(255,106,58,.08); color: var(--ms-fg); font-family: var(--ms-font-heading); font-size:15px; font-weight:500; letter-spacing:2px; text-transform:uppercase; border-radius:2px; transition: background .3s, transform .2s; cursor:pointer; }
.cta-button:hover { background: rgba(255,106,58,.18); transform: translateY(-1px); }

.footer { padding:80px 0 60px; border-top:1px solid var(--ms-border); text-align:center; }
.footer-logo { font-family: var(--ms-font-heading); font-size:28px; font-weight:500; letter-spacing:-0.04em; color: rgba(255,255,255,.25); margin-bottom:16px; }
.footer p { font-size:13px; color: var(--ms-fg-2); letter-spacing:.5px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const BASE = 'assets/images/';

function useReveal() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { el.classList.add('is-in'); io.unobserve(el); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -10% 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

function Reveal({ delay, className = '', children, as: As = 'div', ...rest }) {
  const ref = useReveal();
  const d = delay ? `d-${delay}` : '';
  return <As ref={ref} className={`reveal ${d} ${className}`} {...rest}>{children}</As>;
}

function Hero({ bg }) {
  return (
    <section className="hero">
      <div className="hero-bg">{bg && <img src={bg} alt="" />}</div>
      <div className="hero-center">
        <Reveal as="div" className="hero-eyebrow">Agent-powered system for AI film production</Reveal>
        <Reveal as="h1" delay={1} className="hero-title">Maulstick</Reveal>
        <Reveal as="p" delay={2} className="hero-sub">AI video models are finally cinema-ready. The workflow around them isn't. Maulstick turns scattered prompts into a real production pipeline — from project bible to editor timeline, in your own files.</Reveal>
        <Reveal as="p" delay={3} className="hero-tagline">17 phases · 5 formats · One pipeline</Reveal>
      </div>
    </section>
  );
}

function SectionHeader({ eyebrow, title, subtitle, maxWidth = 900 }) {
  return (
    <div style={{ marginBottom: 56, maxWidth }}>
      <Reveal className="label-text">{eyebrow}</Reveal>
      <Reveal delay={1}><h2 className="section-title" dangerouslySetInnerHTML={{ __html: title }} /></Reveal>
      {subtitle && <Reveal delay={2}><p className="section-subtitle">{subtitle}</p></Reveal>}
    </div>
  );
}

function ServiceGrid({ cols = 4, items }) {
  return (
    <Reveal delay={3} className={`services-grid services-grid-${cols}`}>
      {items.map((it, i) => (
        <div key={i} className="service-box">
          <div className="number">{it.n}</div>
          <div className="title">{it.title}</div>
          <div className="text" dangerouslySetInnerHTML={{ __html: it.text }} />
        </div>
      ))}
    </Reveal>
  );
}

function ChainPipeline({ items }) {
  return (
    <Reveal delay={2} className="chain-wrap">
      {items.map((it, i) => (
        <React.Fragment key={i}>
          {it.gate
            ? <span className="chain-tag gate">⊙ {it.label}</span>
            : <span className="chain-tag"><span className="c-num">{it.num}</span> {it.label}</span>}
          {i < items.length - 1 && <span className="chain-arrow">→</span>}
        </React.Fragment>
      ))}
    </Reveal>
  );
}

function DebatePanel({ items }) {
  return (
    <Reveal delay={3} className="debate-grid">
      {items.map((it, i) => (
        <div key={i} className="debate-item">
          <div className="d-code">{it.code}</div>
          <div className="d-name">{it.name}</div>
          <div className="d-desc">{it.desc}</div>
        </div>
      ))}
    </Reveal>
  );
}

function CascadeList({ items }) {
  return (
    <div>
      <div style={{ display: 'flex', gap: 20, marginBottom: 18, fontSize: 12, color: 'var(--ms-fg-2)', letterSpacing: 1, textTransform: 'uppercase', flexWrap: 'wrap' }}>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span className="cascade-dot synced"></span> Synced</span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span className="cascade-dot check"></span> Check</span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span className="cascade-dot stale"></span> Stale</span>
      </div>
      {items.map((it, i) => (
        <div className="cascade-item" key={i}>
          <div className={`cascade-dot ${it.status}`}></div>
          <div className="cascade-name">{it.name}</div>
          <div className="cascade-desc">{it.desc}</div>
        </div>
      ))}
    </div>
  );
}

function FitGrid({ items }) {
  return (
    <Reveal delay={3} className="fit-grid">
      {items.map((it, i) => (
        <div key={i} className="fit-cell">
          <div className="fit-category">{it.cat}</div>
          <div className="fit-name">{it.name}</div>
          <div className="fit-examples">{it.examples}</div>
          <div className="fit-position" dangerouslySetInnerHTML={{ __html: it.position }} />
        </div>
      ))}
    </Reveal>
  );
}

function AccentStrip({ badge, children }) {
  return <div className="accent-strip"><span className="b">{badge}</span><span className="t">{children}</span></div>;
}

function CTA({ title, sub, button }) {
  return (
    <section className="section section-border section-glow glow-orange">
      <div className="container">
        <div className="cta-wrap">
          <Reveal><h2 className="cta-title" dangerouslySetInnerHTML={{ __html: title }} /></Reveal>
          <Reveal delay={1}><p className="cta-sub">{sub}</p></Reveal>
          <Reveal delay={2}><a className="cta-button" href="#">{button}</a></Reveal>
        </div>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer className="footer">
      <div className="container">
        <div className="footer-logo">Maulstick</div>
        <p>v3.31 · April 2026 · 17 phases · 5 formats · Built on Obsidian + Claude</p>
      </div>
    </footer>
  );
}

const problemItems = [
  { n: '01', title: 'Fragmented vision', text: 'Bible, script, direction, style, characters — each lives in a different doc, app, or head. Without a single source of truth, every scene renders its own slightly different version of the world.' },
  { n: '02', title: 'Story drift across revisions', text: 'The script evolves. Direction lags two versions behind. Prompts still reference a cut scene. The final edit tells one story; the production rendered another.' },
  { n: '03', title: 'Iteration without memory', text: 'Twenty variants per shot, five script drafts, three style tests. Which decision lives? Which was dropped, and why? Without a ledger, every revision costs context.' },
  { n: '04', title: 'Ungrounded craft', text: 'AI renders «beautiful» by default. But which angle, which rhythm, which light was actually the right choice? Beauty without craft reasoning becomes slop by the hundredth shot.' }
];

const entityItems = [
  { n: '01', title: 'File System', text: 'Every artefact — Bible, script, direction, prompts, canvas, timeline — lives as plain Markdown in an Obsidian vault. No database, no lock-in, open formats.' },
  { n: '02', title: 'Human', text: 'You make every creative call. Three human gates pause the pipeline — after script, after direction, after generation.' },
  { n: '03', title: 'AI Agent', text: 'Reads files, proposes, generates, reviews. Three specialised roles: <b style="color:var(--ms-fg)">Producer</b> plans, <b style="color:var(--ms-fg)">Critic</b> reviews, <b style="color:var(--ms-fg)">StoryPole</b> tracks world state.' }
];

const chainItems = [
  { num: '00', label: 'Bible' }, { num: '01', label: 'Script' }, { num: '02', label: 'Script Review' },
  { gate: true, label: 'Human Gate' },
  { num: '03', label: 'Direction' }, { num: '04', label: 'Transition Audit' }, { num: '05', label: 'Direction Review' },
  { gate: true, label: 'Human Gate' },
  { num: '06', label: 'Consistency' }, { num: '07', label: 'Style Test' }, { num: '08', label: 'Prompts' },
  { num: '09', label: 'Canvas' }, { num: '10', label: 'Generation' },
  { gate: true, label: 'Human Gate' },
  { num: '11', label: 'Iteration' }, { num: '12', label: 'Subtitles' }, { num: '13', label: 'Final Review' },
  { num: '14', label: 'Editor Handoff' }
];

const debateItems = [
  { code: 'CM', name: 'Comedy Analyst', desc: 'Humor mechanics, jokes-per-minute, rule of three, callback patterns.' },
  { code: 'DL', name: 'Dialogue Doctor', desc: 'Character voice consistency, subtext, natural speech, power dynamics.' },
  { code: 'ST', name: 'Structure Architect', desc: 'Three-act arc, turning points, setup-payoff, midpoint strength.' },
  { code: 'AU', name: 'Audience Proxy', desc: 'Engagement map, boredom zones, hook moments, emotional peaks.' },
  { code: 'NR', name: 'Narration Analyst', desc: 'Voice-over rhythm, narrator persona, narration-to-action ratio.' }
];

const cascadeItems = [
  { status: 'synced', name: 'Screenplay', desc: 'Source of truth' },
  { status: 'stale', name: 'Directorial Map', desc: 'Stale — script changed' },
  { status: 'stale', name: 'Prompts', desc: 'Stale — direction outdated' },
  { status: 'check', name: 'Storyboard', desc: 'May need update' },
  { status: 'check', name: 'Assembly', desc: 'Check needed' },
  { status: 'synced', name: 'XML Timeline', desc: 'Synced with last assembly' }
];

const fitItems = [
  { cat: 'Layer 1', name: 'Generation models', examples: 'Runway, Kling, Flux, Sora, Veo, Seedance, Wan, Reve…', position: 'These are the engines Maulstick <b>calls</b>. We do not train our own — we orchestrate, translating each shot into the dialect each model understands.' },
  { cat: 'Layer 2', name: 'Templated AI video platforms', examples: 'End-to-end platforms with preset pipelines and stock avatars.', position: 'These ship fast workflows for <b>short-form social</b>. Our focus is narrative film with Bible, style lock, and NLE handoff.' },
  { cat: 'Layer 3', name: 'AI storyboarding & pre-viz', examples: 'Board-only tools that turn a script into visual panels.', position: 'Specialised in <b>one phase</b>. Maulstick includes storyboarding as one of seventeen.' },
  { cat: 'Layer 4', name: 'Ad-hoc tool chain', examples: 'ComfyUI, prompt docs, spreadsheets, reference folders, NLE plugins.', position: 'The working <b>baseline</b>. Maulstick replaces the glue layer between these tools.' }
];

function App() {
  return (
    <React.Fragment>
      <Hero bg={BASE + 'back.webp'} />

      <section className="section section-border section-glow glow-rose">
        <div className="container">
          <SectionHeader eyebrow="The Problem" title="The story gets lost<br>in iteration." subtitle="AI production is deeply iterative — many variants per shot, many branches per scene, many revisions per Bible. Without a system that holds the whole together, the author drifts between their own decisions and the story fragments along the way." />
          <ServiceGrid cols={4} items={problemItems} />
        </div>
      </section>

      <section className="section section-border section-glow glow-blue">
        <div className="container">
          <SectionHeader eyebrow="The Product" title="Agent-powered system<br>for AI film production." subtitle="Maulstick is built on three things that don't move — the file system you own, the human in control, and the AI agent that reads, writes, and checks." />
          <Reveal delay={2} style={{ marginBottom: 56 }}>
            <img src={BASE + 'main.webp'} alt="Three entities" loading="lazy" decoding="async" style={{ width:'100%', display:'block', WebkitMaskImage:'radial-gradient(ellipse 82% 78% at 50% 50%, black 45%, transparent 88%)', maskImage:'radial-gradient(ellipse 82% 78% at 50% 50%, black 45%, transparent 88%)' }} />
          </Reveal>
          <ServiceGrid cols={3} items={entityItems} />
        </div>
      </section>

      <section className="section section-border section-glow glow-violet">
        <div className="container">
          <SectionHeader eyebrow="How it works" title="Bible to<br>editor timeline." subtitle="Four stages, 17 phases, three human approval gates. The agent never runs a stage without the upstream file it depends on — and never skips a gate." />
          <Reveal className="label-text" style={{ marginBottom: 20 }}>All phases</Reveal>
          <ChainPipeline items={chainItems} />
        </div>
      </section>

      <section className="section section-border section-glow glow-cyan">
        <div className="container">
          <SectionHeader eyebrow="Production Domains" title="Five formats.<br>One system." subtitle="The same pipeline adapts to horizontal film, vertical drama, advertising, poster key art, and character design." />
          <Reveal delay={2} style={{ marginBottom: 48 }}>
            <img src={BASE + '5types.webp'} alt="Five formats" loading="lazy" decoding="async" style={{ width:'100%', display:'block', WebkitMaskImage:'linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%)', maskImage:'linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%)' }} />
          </Reveal>
        </div>
      </section>

      <section className="section section-border section-glow glow-pink">
        <div className="container">
          <SectionHeader eyebrow="B · Debate Engine" title="Where rules end,<br>interpretation begins." subtitle="Five independent AI reviewers analyze the script from different craft perspectives. A judge model weighs their arguments and delivers a single scored verdict." />
          <DebatePanel items={debateItems} />
          <Reveal delay={3} style={{ marginTop: 20 }}>
            <AccentStrip badge="+ JUDGE">A senior judge model weighs all five perspectives and outputs a single scored verdict with per-dimension feedback.</AccentStrip>
          </Reveal>
        </div>
      </section>

      <section className="section section-border section-glow glow-emerald">
        <div className="container">
          <SectionHeader eyebrow="D · Feedback Loop" title="Change detection<br>& self-learning." subtitle="Change the script and the system knows exactly which downstream files are now stale." maxWidth={720} />
          <Reveal delay={3}><CascadeList items={cascadeItems} /></Reveal>
        </div>
      </section>

      <section className="section section-border section-glow glow-teal">
        <div className="container">
          <SectionHeader eyebrow="Market Map" title="Where Maulstick sits<br>in the landscape." subtitle="The AI video stack spans several distinct layers. Maulstick operates in a specific one — the pipeline layer between generation models and professional editing." />
          <FitGrid items={fitItems} />
        </div>
      </section>

      <CTA title="Ship a film.<br>Not a folder of clips." sub="Early access is opening for solo directors and small studios building narrative work. Join the waitlist or reach out directly." button="Join the Waitlist" />

      <Footer />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
