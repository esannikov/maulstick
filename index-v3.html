<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAULSTICK — Agent-powered system for AI film production</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══ */
:root {
  --ms-bg:#111111; --ms-bg-2:#1a1a1a;
  --ms-fg:#ffffff; --ms-fg-2:#b0b0b0;
  --ms-accent:#FF6A3A;
  --ms-border:rgba(255,255,255,.08);
  --ms-status-ok:#4ade80; --ms-status-warn:#fbbf24; --ms-status-bad:#f87171;
  --ms-font-heading:'Space Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif;
  --ms-font-body:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
  --ms-ease-out:cubic-bezier(0.33,1,0.68,1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; overflow-x:hidden; }
body {
  font-family: var(--ms-font-body);
  background: var(--ms-bg);
  color: var(--ms-fg);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
img { max-width:100%; display:block; }

.container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
@media(max-width:768px){ .container { padding: 0 24px; } }

.section { padding: 100px 0; position:relative; overflow:hidden; }
@media(max-width:768px){ .section { padding: 64px 0; } }
.section-border { border-top: 1px solid var(--ms-border); }

.section-glow { position:relative; }
.section-glow::before { content:''; position:absolute; inset:0; pointer-events:none; z-index:0; }
.section-glow > .container { position:relative; z-index:1; }
.glow-blue::before    { background: radial-gradient(ellipse 70% 50% at 0% 20%, rgba(59,130,246,.12), transparent 70%); }
.glow-orange::before  { background: radial-gradient(ellipse 60% 60% at 90% 80%, rgba(255,106,58,.12), transparent 70%); }
.glow-violet::before  { background: radial-gradient(ellipse 50% 70% at 10% 70%, rgba(139,92,246,.12), transparent 70%); }
.glow-teal::before    { background: radial-gradient(ellipse 60% 50% at 80% 20%, rgba(45,212,191,.12), transparent 70%); }
.glow-rose::before    { background: radial-gradient(ellipse 60% 50% at 20% 30%, rgba(251,113,133,.12), transparent 70%); }
.glow-emerald::before { background: radial-gradient(ellipse 55% 55% at 70% 60%, rgba(52,211,153,.12), transparent 70%); }
.glow-cyan::before    { background: radial-gradient(ellipse 50% 60% at 100% 50%, rgba(34,211,238,.12), transparent 70%); }
.glow-pink::before    { background: radial-gradient(ellipse 50% 50% at 85% 15%, rgba(236,72,153,.12), transparent 70%); }
.glow-amber::before   { background: radial-gradient(ellipse 70% 40% at 50% 90%, rgba(251,191,36,.12), transparent 70%); }
.glow-indigo::before  { background: radial-gradient(ellipse 65% 45% at 30% 80%, rgba(99,102,241,.12), transparent 70%); }

.reveal { opacity:0; transform: translateY(40px); transition: opacity 900ms var(--ms-ease-out), transform 900ms var(--ms-ease-out); }
.reveal.is-in { opacity:1; transform: none; }
.reveal.d-1 { transition-delay: .1s; }
.reveal.d-2 { transition-delay: .2s; }
.reveal.d-3 { transition-delay: .3s; }

.label-text { font-size:14px; color: var(--ms-fg-2); letter-spacing:2px; text-transform:uppercase; font-weight:500; margin-bottom:20px; }
.section-title { font-family: var(--ms-font-heading); font-size: clamp(40px,7vw,100px); font-weight:500; line-height:.92; letter-spacing:-0.07em; color: var(--ms-fg); }
.section-subtitle { font-size: clamp(14px,1.2vw,16px); color: var(--ms-fg); line-height:1.7; max-width:620px; margin-top:24px; }
.text-large { font-family: var(--ms-font-heading); font-size: clamp(26px,3vw,36px); font-weight:500; letter-spacing:-0.03em; line-height:1.15; }

/* Split layout with 2 image cards */
.split { display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:start; }
@media(max-width:900px){ .split { grid-template-columns:1fr; gap:48px; } }

.card-portrait { border:1px solid var(--ms-border); overflow:hidden; transition:border-color .3s, transform .3s; }
.card-portrait:hover { border-color:rgba(255,255,255,.15); transform:translateY(-2px); }
.card-portrait img { width:100%; height:auto; display:block; }
.card-title { font-family: var(--ms-font-heading); font-size:20px; font-weight:500; letter-spacing:-0.02em; margin-bottom:8px; }
.card-text { font-size:14px; color: var(--ms-fg-2); line-height:1.7; }

/* Hero */
.hero { min-height:100vh; position:relative; display:flex; align-items:center; justify-content:center; text-align:center; overflow:hidden; }
.hero-bg { position:absolute; inset:0; background: var(--ms-bg); background-image: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(255,106,58,.12), transparent); }
.hero-bg img { width:100%; height:100%; object-fit:cover; opacity:.2; }
.hero-center { position:relative; z-index:1; padding:40px; }
.hero-eyebrow { font-size:13px; color: var(--ms-fg-2); letter-spacing:3px; text-transform:uppercase; font-weight:500; margin-bottom:24px; }
.hero-title { font-family: var(--ms-font-heading); font-size: clamp(64px,16vw,240px); font-weight:500; line-height:.88; letter-spacing:-0.07em; color: var(--ms-fg); }
.hero-sub { margin-top:32px; font-family: var(--ms-font-heading); font-size: clamp(18px,2vw,24px); font-weight:500; color: var(--ms-fg); letter-spacing:-0.01em; max-width:860px; margin-left:auto; margin-right:auto; line-height:1.35; }
.hero-tagline { margin-top:32px; font-size:15px; color: var(--ms-fg-2); letter-spacing:2px; text-transform:uppercase; font-weight:400; }

/* Section header with image */
.section-header-split { display:grid; grid-template-columns:1fr 1.4fr; gap:48px; align-items:center; margin-bottom:56px; }
@media(max-width:900px){ .section-header-split { grid-template-columns:1fr; gap:32px; } .section-header-split img { max-width:440px; margin:0 auto; } }

/* Service grid */
.services-grid { display:grid; gap:0; }
.services-grid-3 { grid-template-columns: repeat(3,1fr); }
.services-grid-4 { grid-template-columns: repeat(4,1fr); }
.services-grid-5 { grid-template-columns: repeat(5,1fr); }
@media(max-width:1100px){ .services-grid-4 { grid-template-columns: repeat(2,1fr); } .services-grid-5 { grid-template-columns: repeat(3,1fr); } }
@media(max-width:700px){ .services-grid-5 { grid-template-columns: repeat(2,1fr); } }
@media(max-width:600px){ .services-grid-3 { grid-template-columns: 1fr; } }
@media(max-width:480px){ .services-grid-4, .services-grid-5 { grid-template-columns: 1fr; } }
.service-box { padding: 40px 30px; border:1px solid transparent; transition: background .3s, border-color .3s; position:relative; overflow:hidden; }
.service-box:hover { background: var(--ms-bg-2); border-color: var(--ms-border); }
.service-box .number { font-size:14px; color: var(--ms-fg-2); font-weight:500; margin-bottom:20px; letter-spacing:1px; }
.service-box .title { font-family: var(--ms-font-heading); font-size:22px; font-weight:500; line-height:1.3; margin-bottom:12px; letter-spacing:-0.02em; }
.service-box .text { font-size:14px; color: var(--ms-fg-2); line-height:1.7; }

/* Chain pipeline */
.chain-wrap { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
.chain-tag { display:inline-flex; align-items:center; gap:8px; font-size:15px; font-family: var(--ms-font-heading); font-weight:500; color: rgba(255,255,255,.75); background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:2px; padding:10px 18px; white-space:nowrap; }
.chain-tag .c-num { font-size:12px; color: var(--ms-fg-2); }
.chain-tag.gate { color: var(--ms-accent); background: rgba(255,106,58,.08); border-color: rgba(255,106,58,.3); }
.chain-arrow { font-size:15px; color: rgba(255,255,255,.2); padding:0 6px; flex-shrink:0; }

/* Debate grid */
.debate-grid { display:grid; grid-template-columns: repeat(5,1fr); gap:0; border:1px solid var(--ms-border); }
@media(max-width:1100px){ .debate-grid { grid-template-columns: repeat(3,1fr); } }
@media(max-width:700px){ .debate-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:480px){ .debate-grid { grid-template-columns: 1fr; } }
.debate-item { padding:32px 26px; border-right:1px solid var(--ms-border); border-bottom:1px solid var(--ms-border); transition: background .3s; }
.debate-item:hover { background: var(--ms-bg-2); }
.debate-item .d-code { font-size:12px; color: var(--ms-accent); font-weight:500; letter-spacing:2px; margin-bottom:16px; }
.debate-item .d-name { font-family: var(--ms-font-heading); font-size:16px; font-weight:500; margin-bottom:10px; }
.debate-item .d-desc { font-size:13px; color: var(--ms-fg-2); line-height:1.7; }

/* Cascade list */
.cascade-item { display:flex; align-items:center; gap:16px; padding:14px 0; border-bottom:1px solid var(--ms-border); }
.cascade-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.cascade-dot.synced { background: var(--ms-status-ok); }
.cascade-dot.stale { background: var(--ms-status-bad); }
.cascade-dot.check { background: var(--ms-status-warn); }
.cascade-name { font-family: var(--ms-font-heading); font-weight:500; font-size:15px; min-width:200px; }
.cascade-desc { font-size:13px; color: var(--ms-fg-2); }
@media(max-width:600px){
  .cascade-item { flex-wrap:wrap; }
  .cascade-name { min-width:auto; }
}

/* Fit grid (market map) */
.fit-grid { display:grid; grid-template-columns: repeat(2,1fr); gap:0; border:1px solid var(--ms-border); }
@media(max-width:900px){ .fit-grid { grid-template-columns: 1fr; } }
.fit-cell { padding:36px 32px; border-right:1px solid var(--ms-border); border-bottom:1px solid var(--ms-border); }
.fit-cell:nth-child(2n) { border-right:none; }
@media(max-width:900px){ .fit-cell { border-right:none; } }
.fit-category { font-size:11px; color: var(--ms-fg-2); letter-spacing:2px; text-transform:uppercase; font-weight:500; margin-bottom:10px; }
.fit-name { font-family: var(--ms-font-heading); font-size:20px; font-weight:500; letter-spacing:-0.02em; margin-bottom:14px; }
.fit-examples { font-size:13px; color: rgba(255,255,255,.55); margin-bottom:14px; line-height:1.6; }
.fit-position { font-size:13px; color: var(--ms-fg); line-height:1.7; padding-top:14px; border-top:1px solid var(--ms-border); }
.fit-position b { color: var(--ms-accent); font-weight:500; }

/* Accent strip */
.accent-strip { padding:18px 24px; border:1px solid rgba(255,106,58,.25); background: rgba(255,106,58,.04); border-radius:2px; display:flex; align-items:center; gap:14px; }
.accent-strip .b { font-size:11px; color: var(--ms-accent); font-weight:500; letter-spacing:2px; flex-shrink:0; }
.accent-strip .t { font-size:13px; color: rgba(255,255,255,.75); line-height:1.5; }
@media(max-width:600px){ .accent-strip { flex-direction:column; align-items:flex-start; } }

/* Accent block — big version (Learning Mode, Primary User) */
.accent-block { padding:36px 40px; border:1px solid rgba(255,106,58,.3); background:rgba(255,106,58,.04); border-radius:2px; }
.accent-block .eyebrow { font-size:11px; color: var(--ms-accent); font-weight:500; letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; }
.accent-block h3 { font-family: var(--ms-font-heading); font-size: clamp(24px,2.8vw,36px); font-weight:500; letter-spacing:-0.02em; line-height:1.1; margin-bottom:16px; }
.accent-block p { font-size:15px; color: rgba(255,255,255,.8); max-width:760px; line-height:1.7; }
.accent-split { display:flex; gap:40px; align-items:center; flex-wrap:wrap; }
.accent-split > *:first-child { flex:1; min-width:240px; }
.accent-split > *:last-child { flex:2; min-width:320px; }

/* Showcase */
.showcase-block { margin-bottom: 80px; }
.showcase-block:last-child { margin-bottom: 0; }
.showcase-header { display:flex; align-items:baseline; gap:20px; margin-bottom:20px; flex-wrap:wrap; }
.showcase-name { font-family: var(--ms-font-heading); font-size: clamp(28px,4vw,44px); font-weight:500; letter-spacing:-0.04em; line-height:1; color: var(--ms-fg); }
.showcase-meta { font-size:12px; color: var(--ms-fg-2); letter-spacing:2px; text-transform:uppercase; font-weight:500; }
.showcase-grid { display:grid; gap:2px; }
.showcase-grid > div { overflow:hidden; position:relative; background: var(--ms-bg-2); }
.showcase-grid img { width:100%; height:100%; object-fit:cover; display:block; transition: transform .5s ease, filter .3s ease; }
.showcase-grid > div:hover img { transform: scale(1.03); filter: brightness(1.08); }
.showcase-grid-4 { grid-template-columns: repeat(4,1fr); }
.showcase-grid-3 { grid-template-columns: repeat(3,1fr); }
@media(max-width:900px){ .showcase-grid-4 { grid-template-columns: repeat(3,1fr); } }
@media(max-width:600px){ .showcase-grid-4, .showcase-grid-3 { grid-template-columns: repeat(2,1fr); } }
.showcase-tile-v { aspect-ratio: 9 / 16; }
.showcase-tile-h { aspect-ratio: 16 / 9; }

/* SP blocks (StoryPole world state, wiki coverage) */
.sp-block-title { font-size:14px; font-weight:500; letter-spacing:1px; text-transform:uppercase; margin-bottom:14px; color: var(--ms-accent); }
.sp-tags { display:flex; flex-wrap:wrap; gap:6px; }
.sp-tag { font-size:13px; color: rgba(255,255,255,.7); background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:2px; padding:5px 12px; line-height:1.4; }
.sp-tag.soft { border-color: rgba(251,191,36,.25); color: rgba(251,191,36,.8); }
.sp-tag.hard { border-color: rgba(251,113,133,.25); color: rgba(251,113,133,.8); }
.sp-tag.c1 { background:rgba(99,102,241,.12); border-color:rgba(99,102,241,.35); color:rgba(165,167,255,.9); }
.sp-tag.c2 { background:rgba(45,212,191,.10); border-color:rgba(45,212,191,.3); color:rgba(94,234,212,.9); }
.sp-tag.c3 { background:rgba(251,191,36,.10); border-color:rgba(251,191,36,.3); color:rgba(253,211,100,.9); }
.sp-tag.c4 { background:rgba(236,72,153,.10); border-color:rgba(236,72,153,.3); color:rgba(249,133,196,.9); }
.sp-tag.c5 { background:rgba(52,211,153,.10); border-color:rgba(52,211,153,.3); color:rgba(110,231,183,.9); }
.sp-tag.c6 { background:rgba(251,113,133,.10); border-color:rgba(251,113,133,.3); color:rgba(253,164,175,.9); }
.sp-tag.c7 { background:rgba(56,189,248,.10); border-color:rgba(56,189,248,.3); color:rgba(125,211,252,.9); }

/* Quality subsections */
.quality-sub { margin-top:80px; padding-top:60px; border-top:1px solid var(--ms-border); }
.quality-sub:first-of-type { margin-top:40px; padding-top:0; border-top:none; }
.quality-eyebrow { font-size:12px; color: var(--ms-accent); letter-spacing:2.5px; text-transform:uppercase; font-weight:500; margin-bottom:16px; }
.quality-heading { font-family: var(--ms-font-heading); font-size: clamp(28px,3.5vw,44px); font-weight:500; letter-spacing:-0.03em; line-height:1.1; margin-bottom:16px; }

/* Two-column grid (sp blocks, feedback loop) */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:28px 60px; }
@media(max-width:800px){ .two-col { grid-template-columns:1fr; gap:40px; } }

/* Self-learning loop — 2x2 cards */
.loop-grid { display:grid; grid-template-columns:1fr 1fr; border:1px solid var(--ms-border); }
@media(max-width:600px){ .loop-grid { grid-template-columns:1fr; } }
.loop-grid .service-box { padding:24px 22px; }
.loop-grid .service-box:nth-child(2), .loop-grid .service-box:nth-child(4) { border-left:1px solid var(--ms-border); }
.loop-grid .service-box:nth-child(3), .loop-grid .service-box:nth-child(4) { border-top:1px solid var(--ms-border); }
@media(max-width:600px){
  .loop-grid .service-box:nth-child(2), .loop-grid .service-box:nth-child(4) { border-left:none; border-top:1px solid var(--ms-border); }
}
.loop-grid .service-box .title { font-size:16px; }
.loop-grid .service-box .text { font-size:13px; }

/* Comparison table */
.cmp-table { border:1px solid var(--ms-border); border-radius:4px; overflow:hidden; }
.cmp-row { display:grid; grid-template-columns:2fr 1.2fr 1.2fr 0.7fr; gap:0; }
.cmp-row + .cmp-row { border-top:1px solid var(--ms-border); }
.cmp-head { background: var(--ms-bg-2); font-family: var(--ms-font-heading); font-size:12px; letter-spacing:2px; text-transform:uppercase; color: var(--ms-fg-2); font-weight:500; }
.cmp-head > div { padding:20px; }
.cmp-head > div:first-child { padding-left:28px; }
.cmp-head > div:nth-child(3) { color: var(--ms-fg); }
.cmp-head > div:nth-child(4) { color: var(--ms-accent); text-align:right; padding-right:28px; }
.cmp-row:not(.cmp-head) > div { padding:22px 20px; font-size:14px; }
.cmp-cell-scenario { padding-left:28px !important; font-family: var(--ms-font-heading); font-weight:500; font-size:15px; }
.cmp-cell-scenario .meta { font-size:12px; color: var(--ms-fg-2); font-weight:400; margin-top:4px; font-family: var(--ms-font-body); letter-spacing:0; text-transform:none; }
.cmp-cell-adhoc { color: rgba(255,255,255,.7); }
.cmp-cell-ms { color: var(--ms-fg); }
.cmp-cell-gain { color: var(--ms-accent); text-align:right; font-weight:500; padding-right:28px !important; }
@media(max-width:800px){
  .cmp-head { display:none; }
  .cmp-row { grid-template-columns:1fr; gap:4px; padding:20px 20px; }
  .cmp-row > div { padding:6px 0 !important; }
  .cmp-cell-scenario { padding-left:0 !important; font-size:16px; margin-bottom:8px; }
  .cmp-cell-adhoc::before { content:"Ad-hoc — "; color: var(--ms-fg-2); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-weight:500; margin-right:4px; }
  .cmp-cell-ms::before { content:"Maulstick — "; color: var(--ms-fg-2); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-weight:500; margin-right:4px; }
  .cmp-cell-gain { text-align:left; padding-right:0 !important; }
  .cmp-cell-gain::before { content:"Gain — "; color: var(--ms-fg-2); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-weight:500; margin-right:4px; }
}

/* CTA */
.cta-wrap { text-align:center; padding:60px 20px; }
.cta-title { font-family: var(--ms-font-heading); font-size: clamp(48px,8vw,120px); font-weight:500; line-height:.92; letter-spacing:-0.07em; color: var(--ms-fg); margin-bottom:28px; }
.cta-sub { font-size:16px; color: var(--ms-fg-2); max-width:560px; margin:0 auto 36px; line-height:1.7; }
.cta-button { display:inline-block; padding:18px 40px; border:1px solid var(--ms-accent); background: rgba(255,106,58,.08); color: var(--ms-fg); font-family: var(--ms-font-heading); font-size:15px; font-weight:500; letter-spacing:2px; text-transform:uppercase; border-radius:2px; transition: background .3s, transform .2s; cursor:pointer; }
.cta-button:hover { background: rgba(255,106,58,.18); transform: translateY(-1px); }

/* Footer */
.footer { padding:80px 0 60px; border-top:1px solid var(--ms-border); text-align:center; }
.footer-logo { font-family: var(--ms-font-heading); font-size:28px; font-weight:500; letter-spacing:-0.04em; color: rgba(255,255,255,.25); margin-bottom:16px; }
.footer p { font-size:13px; color: var(--ms-fg-2); letter-spacing:.5px; }
</style>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script type="text/babel">
const BASE = 'assets/images/';

function useReveal() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { el.classList.add('is-in'); io.unobserve(el); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -10% 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

function Reveal({ delay, className = '', children, as: As = 'div', ...rest }) {
  const ref = useReveal();
  const d = delay ? `d-${delay}` : '';
  return <As ref={ref} className={`reveal ${d} ${className}`} {...rest}>{children}</As>;
}

function Hero({ bg }) {
  return (
    <section className="hero">
      <div className="hero-bg">{bg && <img src={bg} alt="" />}</div>
      <div className="hero-center">
        <Reveal as="div" className="hero-eyebrow">Agent-powered system for AI film production</Reveal>
        <Reveal as="h1" delay={1} className="hero-title">Maulstick</Reveal>
        <Reveal as="p" delay={2} className="hero-sub">AI video models are finally cinema-ready. The workflow around them isn't. Maulstick turns scattered prompts into a real production pipeline — from project bible to editor timeline, in your own files.</Reveal>
        <Reveal as="p" delay={3} className="hero-tagline">17 phases · 5 formats · One pipeline</Reveal>
      </div>
    </section>

                <Reveal className="quality-eyebrow">B · Debate Engine</Reveal>
                <Reveal delay={1}><h3 className="quality-heading">Where rules end, interpretation begins.</h3></Reveal>
                <Reveal delay={2}><p className="section-subtitle" style={{ marginTop:16 }}>Five independent AI reviewers analyze the script from different craft perspectives. A judge model weighs their arguments and delivers a single scored verdict.</p></Reveal>
              </div>
              <Reveal delay={2}>
                <img src={BASE + 'debate.jpg'} alt="Debate engine" loading="lazy" decoding="async" style={{ width:'100%', display:'block', borderRadius:4, WebkitMaskImage:'radial-gradient(ellipse 88% 78% at 50% 44%, black 45%, transparent 85%)', maskImage:'radial-gradient(ellipse 88% 78% at 50% 44%, black 45%, transparent 85%)' }} />
              </Reveal>
            </div>
            <DebatePanel items={debateItems} />
            <Reveal delay={3} style={{ marginTop: 20 }}>
              <AccentStrip badge="+ JUDGE">A senior judge model weighs all five perspectives and outputs a single scored verdict with per-dimension feedback.</AccentStrip>
            </Reveal>
          </div>

          {/* C. StoryPole */}
          <div className="quality-sub">
            <Reveal className="quality-eyebrow">C · StoryPole — World State</Reveal>
            <Reveal delay={1}><h3 className="quality-heading">After 15 scenes, manual tracking fails.</h3></Reveal>
            <Reveal delay={2}><p className="section-subtitle" style={{ marginBottom:32 }}>StoryPole extracts world state scene-by-scene — who's where, who knows what, which objects still exist — and checks it against hard and soft consistency rules.</p></Reveal>
            <Reveal delay={3} className="two-col">
              <SpBlock title="Characters" titleColor="rgba(165,167,255,.9)" tags={[
                { label:'Location', cls:'c1' },
                { label:'Emotional state (16)', cls:'c1' },
                { label:'Inventory', cls:'c1' },
                { label:'Knowledge graph', cls:'c1' },
                { label:'seen / told / inferred', cls:'c1' },
                { label:'Social memory', cls:'c1' },
                { label:'want / need / wound / stage', cls:'c1' }
              ]} />
              <SpBlock title="Locations" titleColor="rgba(94,234,212,.9)" tags={[
                { label:'INT / EXT', cls:'c2' },
                { label:'Time of day', cls:'c2' },
                { label:'Atmosphere (12)', cls:'c2' },
                { label:'Valence', cls:'c2' },
                { label:'Who is present', cls:'c2' },
                { label:'Objects placed', cls:'c2' }
              ]} />
              <SpBlock title="Objects" titleColor="rgba(253,211,100,.9)" tags={[
                { label:'Owner', cls:'c3' },
                { label:'Position', cls:'c3' },
                { label:'active', cls:'c3' },
                { label:'damaged', cls:'c3' },
                { label:'lost / destroyed', cls:'c3' },
                { label:'Explicit recovery', cls:'c3' }
              ]} />
              <SpBlock title="Consistency Checks" titleColor="rgba(253,164,175,.9)" tags={[
                { label:'Teleportation', cls:'hard' },
                { label:'Ghost objects', cls:'hard' },
                { label:'Impossible knowledge', cls:'hard' },
                { label:'Time paradox', cls:'hard' },
                { label:'Unmotivated arc', cls:'soft' },
                { label:'Emotion jumps', cls:'soft' },
                { label:'Relationship leaps', cls:'soft' },
                { label:'Social memory gaps', cls:'soft' }
              ]} />
            </Reveal>
          </div>

          {/* D. Feedback Loop */}
          <div className="quality-sub">
            <Reveal className="quality-eyebrow">D · Feedback Loop</Reveal>
            <Reveal delay={1}><h3 className="quality-heading">Change detection & self-learning.</h3></Reveal>
            <Reveal delay={2}><p className="section-subtitle" style={{ marginBottom:32 }}>Change the script and the system knows exactly which downstream files are now stale. Repeated issues across projects trigger rule proposals — only humans approve changes.</p></Reveal>
            <Reveal delay={3} className="two-col">
              <div>
                <div className="sp-block-title" style={{ marginBottom:18 }}>Dependency cascade</div>
                <CascadeList items={cascadeItems} />
              </div>
              <div>
                <div className="sp-block-title" style={{ marginBottom:18 }}>Self-learning loop</div>
                <div className="loop-grid">
                  {loopItems.map((it, i) => (
                    <div key={i} className="service-box">
                      <div className="number">{it.n}</div>
                      <div className="title">{it.title}</div>
                      <div className="text">{it.text}</div>
                    </div>
                  ))}
                </div>
              </div>
            </Reveal>
          </div>
        </div>
      </section>

      {/* 9. WHO IT'S FOR */}
      <section className="section section-border section-glow glow-indigo">
        <div className="container">
          <SectionHeader eyebrow="Who it's for" title="Built for<br>solo directors first." subtitle="Maulstick is built for the person who ships a whole film alone or with a handful of collaborators. Everything else scales up from there." />

          <Reveal delay={3} className="accent-block" style={{ marginBottom: 48 }}>
            <div className="eyebrow">Primary user</div>
            <h3>Solo AI Directors</h3>
            <p>Execute a feature-scale vision without a crew. Every department — script, direction, color, sound — lives as a file you control. Move from one-off prompt experiments to a structured, repeatable pipeline with consistency, versioning, and reusable Bibles across projects.</p>
          </Reveal>

          <Reveal className="label-text" style={{ marginBottom: 20 }}>Also serves</Reveal>
          <ServiceGrid cols={4} items={secondaryUsers} />
        </div>
      </section>

      {/* 10. MARKET MAP */}
      <section className="section section-border section-glow glow-teal">
        <div className="container">
          <SectionHeader eyebrow="Market Map" title="Where Maulstick sits<br>in the landscape." subtitle="The AI video stack spans several distinct layers. Maulstick operates in a specific one — the pipeline layer between generation models and professional editing. Below are the neighbours and how the scope of each relates to ours." />
          <FitGrid items={fitItems} />

          {/* Comparison table */}
          <div style={{ marginTop: 80 }}>
            <Reveal className="label-text">What a pipeline changes</Reveal>
            <Reveal delay={1}><h3 className="text-large" style={{ marginBottom:24, maxWidth:900 }}>Working without a pipeline, and working with one.</h3></Reveal>
            <Reveal delay={2}><p className="section-subtitle" style={{ marginTop:12, marginBottom:40 }}>Directional estimates from internal runs, not a benchmark. Assumes a skilled solo creator or a 2–3 person team. The left column describes AI image and video tools used without a shared file system, change detection, or structured review.</p></Reveal>

            <Reveal delay={3} className="cmp-table">
              <div className="cmp-row cmp-head">
                <div>Scenario / Metric</div>
                <div>Ad-hoc AI stack</div>
                <div>Maulstick</div>
                <div>Gain</div>
              </div>
              {cmpRows.map((r, i) => (
                <div className="cmp-row" key={i}>
                  <div className="cmp-cell-scenario">{r.scenario}<div className="meta">{r.meta}</div></div>
                  <div className="cmp-cell-adhoc">{r.adhoc}</div>
                  <div className="cmp-cell-ms">{r.ms}</div>
                  <div className="cmp-cell-gain">{r.gain}</div>
                </div>
              ))}
            </Reveal>
            <Reveal delay={3}><p style={{ marginTop:20, fontSize:11, color:'var(--ms-fg-2)', letterSpacing:'.5px', lineHeight:1.7 }}>Gain factors are directional averages from internal production runs. Actual speedup depends on project complexity, style-lock difficulty, and how early the Bible is finalized. Quality comparisons assume equivalent creative bar.</p></Reveal>
          </div>
        </div>
      </section>

      {/* CTA */}
      <CTA title="Ship a film.<br>Not a folder of clips." sub="Early access is opening for solo directors and small studios building narrative work. Join the waitlist or reach out directly." button="Join the Waitlist" />

      <Footer />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
